<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=5">
  <meta name="description" content="Creative Designer Based in Turin">
  <title>girste's</title>
  <link rel="icon" href="girstefav.png" type="image/png">
  <link rel="stylesheet" href="style.css">
  <style>
    /* override per panzoom wrapper */
    #wrapper {
      position: relative;
      overflow: hidden;
      touch-action: none;
      width: 100%;
      height: 100%;
    }
    #panzoom {
      position: absolute;
      top: 0;
      left: 0;
      touch-action: none;
      transform-origin: 0 0;
      display: flex;
      align-items: flex-start;
      will-change: transform;
    }
    #panzoom img {
      user-select: none;
      -webkit-user-drag: none;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div id="wrapper">
    <div id="panzoom"></div>
  </div>

  <div id="sticky-bar">
    <div class="icon-group">
      <a href="mailto:me@girste.com" title="email">
        <img src="assets/mail-icon.svg" alt="email">
      </a>
      <a href="tel:+393405445704" title="call">
        <img src="assets/tel-icon.svg" alt="call">
      </a>
      <a href="/pages/sandbox.html" title="surprise">
        <img src="assets/box-icon.svg" alt="sandbox">
      </a>
      <button title="refresh">
        <img src="assets/ric-icon.svg" alt="refresh">
      </button>
      <button id="toggle-theme" title="bright/dark">
        <img src="assets/dark-icon.svg" alt="dark/bright">
      </button>
    </div>
    <div class="icon-footer">
      <strong>GIRSTE'S</strong>
      <small>© S.Girard 2025, design by Creative Unit</small>
    </div>
  </div>

  <!-- Panzoom -->
  <script src="https://unpkg.com/panzoom@9.4.3/dist/panzoom.min.js"></script>
  <!-- Our script -->
  <script type="module" src="script.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=5">
  <meta name="description" content="Creative Designer Based in Turin">
  <title>girste's</title>
  <link rel="icon" href="girstefav.png" type="image/png">
  <link rel="stylesheet" href="style.css">
  <style>
    #wrapper {
      position: relative;
      overflow: visible;
      touch-action: none;
    }
    #panzoom {
      position: absolute;
      top: 0;
      left: 0;
      overflow: visible;
      touch-action: none;
      transform-origin: 50% 50%;
    }
    /* Evita selezione/drag immagine mentre fai pan con mouse */
    #panzoom img {
      user-select: none;
      -webkit-user-drag: none;
      -moz-user-select: none;
      -ms-user-select: none;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div id="wrapper">
    <div id="panzoom"></div>
  </div>

  <div id="sticky-bar">
    <div class="icon-group">
      <a href="mailto:me@girste.com" title="email"><img src="assets/mail-icon.svg" alt="email"></a>
      <a href="tel:+393405445704" title="call"><img src="assets/tel-icon.svg" alt="call"></a>
      <button title="refresh"><img src="assets/ric-icon.svg" alt="refresh"></button>
      <button id="toggle-theme" title="bright/dark"><img src="assets/dark-icon.svg" alt="dark/bright"></button>
      <a href="/pages/sandbox.html" title="surprise"><img src="assets/box-icon.svg" alt="sandbox"></a>
    </div>
    <div class="icon-footer">
      <strong>GIRSTE'S</strong>
      <small>© S.Girard 2025, design by Creative Unit</small>
    </div>
  </div>

  <!-- Panzoom (anvaka) -->
  <script src="https://unpkg.com/panzoom@9.4.3/dist/panzoom.min.js"></script> :contentReference[oaicite:0]{index=0}
  <!-- Il tuo script -->
  <script src="script.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=5">
  <meta name="description" content="Creative Designer Based in Turin">
  <title>girste's</title>
  <link rel="icon" href="girstefav.png" type="image/png">
  <link rel="stylesheet" href="style.css">

  <!-- Override per panzoom wrapper -->
  <style>
    #wrapper {
      position: relative;
      overflow: hidden;
      touch-action: none;
      width: 100%;
      height: 100%;
    }
    #panzoom {
      position: absolute;
      top: 0;
      left: 0;
      touch-action: none;
      transform-origin: 50% 50%;
      display: flex;
      align-items: flex-start;
      will-change: transform;
    }
    #panzoom img {
      user-select: none;
      -webkit-user-drag: none;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <!-- contenitore full‐screen per il mosaico -->
  <div id="wrapper">
    <div id="panzoom"></div>
  </div>

  <!-- sticky yellow bar -->
  <div id="sticky-bar">
    <div class="icon-group">
      <a href="mailto:me@girste.com" title="email">
        <img src="assets/mail-icon.svg" alt="email">
      </a>
      <a href="tel:+393405445704" title="call">
        <img src="assets/tel-icon.svg" alt="call">
      </a>
      <a href="files/" title="files">
        <img src="assets/files-icon.svg" alt="files">
      </a>
      <button title="refresh">
        <img src="assets/ric-icon.svg" alt="refresh">
      </button>
      <button id="toggle-theme" title="bright/dark">
        <img src="assets/dark-icon.svg" alt="dark/bright">
      </button>
    </div>
    <div class="icon-footer">
      <strong>© GIRSTE'S</strong>
      <small>2025, by Creative Unit</small>
    </div>
  </div>

  <!-- 1) Import Panzoom come ESM e lo espone su window -->
<!-- nuovo (funzionante): -->
<script type="module">
  import panzoom from 'https://cdn.jsdelivr.net/npm/panzoom@9.4.3/dist/panzoom.esm.js';
  window.panzoom = panzoom;
</script>


  <!-- 2) Moduli Supabase + logica client‐side -->
  <script type="module" src="supabase.js"></script>
  <script type="module" src="script.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8"/>
  <title>Admin Panel Protetto</title>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <link rel="stylesheet" href="admin.css"/>
</head>
<body>
  <div id="auth-panel">
    <h2>🔒 Accedi</h2>
    <label for="email">Email</label><input type="email" id="email"/>
    <label for="password">Password</label><input type="password" id="password"/>
    <button id="btn-login">Accedi</button>
    <div class="feedback" id="auth-feedback"></div>
  </div>
  <div id="admin-panel" style="display:none;">
    <div class="container">
      <nav class="sidebar">
        <button data-section="new-post" class="nav-btn">📝 Nuovo Post</button>
        <button data-section="edit-post" class="nav-btn">✏️ Modifica Post</button>
        <button data-section="new-splash" class="nav-btn">💬 Nuovo Splash</button>
        <button data-section="manage-splash" class="nav-btn">🗑️ Gestione Splash</button>
        <button data-section="manage-photos" class="nav-btn">📷 Gestione Foto</button>
        <button id="btn-logout">🚪 Logout</button>
      </nav>
      <main class="content">
        <section id="new-post" class="section">
          <h1>Nuovo Post</h1>
          <div class="field-group"><label for="np-title">Titolo</label><input type="text" id="np-title"/></div>
          <div class="field-group"><label for="np-snippet">Snippet</label><input type="text" id="np-snippet"/></div>
          <div class="field-group"><label for="np-content">Contenuto</label><textarea id="np-content" rows="5"></textarea></div>
          <div class="field-group"><label for="np-tag">Tag</label><select id="np-tag"><option value="tools">tools</option><option value="stories">stories</option><option value="blog">blog</option></select></div>
          <div class="field-group"><label for="newpost-upload">Upload Immagine</label><input type="file" id="newpost-upload" accept="image/*" multiple/><input type="text" id="newpost-upload-link" readonly placeholder="Snippet"/></div>
          <div id="uploaded-images-list"></div>
          <button id="submit-new-post">Pubblica Post</button>
          <div class="feedback" id="fb-new-post"></div>
        </section>
        <section id="edit-post" class="section"><h1>Modifica / Cancella Post</h1><div id="list-posts">⏳ Caricamento…</div></section>
        <section id="new-splash" class="section"><h1>Nuovo Splash-Text</h1><div class="field-group"><label for="new-splash-input">Phrase</label><input type="text" id="new-splash-input"/></div><button id="submit-new-splash">Aggiungi Splash-Text</button><div class="feedback" id="fb-new-splash"></div></section>
        <section id="manage-splash" class="section"><h1>Modifica / Cancella Splash</h1><div id="list-splash">⏳ Caricamento…</div></section>
        <section id="manage-photos" class="section"><h1>Gestione Foto</h1><div id="list-photos">⏳ Caricamento…</div></section>
      </main>
    </div>
  </div>
  <script type="module" src="auth.js"></script>
  <script type="module" src="nav.js"></script>
  <script type="module" src="posts.js"></script>
  <script type="module" src="splashes.js"></script>
  <script type="module" src="photos.js"></script>
</body>
</html>

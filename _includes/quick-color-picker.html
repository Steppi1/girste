<style>
  #canvas {
    display: block;
    max-width: 100%;
    height: auto;
    margin-top: 1em;
    border: 1px solid #ccc;
    cursor: crosshair;
  }
</style>

<input type="file" id="imgLoader" accept="image/*">
<br><br>

<!-- img di appoggio, nascosta: -->
<img id="sourceImage" style="display:none;" alt="">

<canvas id="canvas"></canvas>
<p>
  Selected color:
  <span id="colorBox"
        style="display:inline-block;width:20px;
               height:20px;border:1px solid #000;
               vertical-align:middle;"></span>
  <code id="hexCode">#FFFFFF</code>
</p>

<script>
  document.addEventListener('DOMContentLoaded', () => {
    const loader = document.getElementById('imgLoader');
    const img    = document.getElementById('sourceImage');
    const canvas = document.getElementById('canvas');
    const ctx    = canvas.getContext('2d');
    const box    = document.getElementById('colorBox');
    const code   = document.getElementById('hexCode');

    loader.addEventListener('change', e => {
      const file = e.target.files[0];
      if (!file) return;
      img.src = URL.createObjectURL(file);
    });

    img.addEventListener('load', () => {
      // quando l'immagine è pronta, disegniamo sul canvas
      canvas.width  = img.naturalWidth;
      canvas.height = img.naturalHeight;
      ctx.drawImage(img, 0, 0);
      URL.revokeObjectURL(img.src); // libera memoria
    });

    canvas.addEventListener('click', e => {
      const { offsetX:x, offsetY:y } = e;
      const [r, g, b] = ctx.getImageData(x, y, 1, 1).data;
      const hex = '#' + ((1<<24) + (r<<16) + (g<<8) + b)
                        .toString(16).slice(1).toUpperCase();
      box.style.background = hex;
      code.textContent    = hex;
    });
  });
</script>

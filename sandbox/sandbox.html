<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>GIRSTE'S files</title>
  <link rel="stylesheet" href="sandbox.css">
</head>
<body>
  <nav>
    <!-- Titolo che torna alla home -->
    <h1><a href="https://girste.com">GIRSTE’S files</a></h1>

    <!-- Linea di separazione -->
    <hr class="separator">

    <!-- Frase placeholder -->
    <p class="header-phrase">Qui va una frase semplice che deciderò in seguito</p>

    <!-- Filtri come pillole -->
    <div class="filters">
      <button class="filter-pill" data-filter="stories">stories</button>
      <button class="filter-pill" data-filter="tools">tools</button>
      <button class="filter-pill" data-filter="blog">blog</button>
    </div>
  </nav>

  <!-- Sezione articoli di esempio -->
  <section class="articles">
    <ul>
      <li class="article" data-type="stories">Example – story #1</li>
      <li class="article" data-type="tools">Example – tool #1</li>
      <li class="article" data-type="blog">Example – blog post #1</li>
    </ul>
  </section>

  <script src="sandbox.js"></script>
</body>
</html>

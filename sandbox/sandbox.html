<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <title>GIRSTE’S files</title>

  <!-- Monospaced Google Font -->
  <link
    href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;700&display=swap"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="sandbox.css" />
</head>
<body>
  <div class="container">
    <!-- SIDEBAR -->
    <nav class="sidebar">
      <h1 class="site-title">
        <a href="https://girste.com">GIRSTE’S<br>files</a>

      <hr class="separator" />

      <p class="header-phrase">
        Qui va una frase semplice che deciderò in seguito

        <button class="filter-pill" data-filter="stories">stories</button>

        <button class="filter-pill" data-filter="blog">blog</button>
        <button class="filter-pill" data-filter="all">all</button>
      </div>

      <!-- nuovo separatore sotto i pulsanti -->
      <hr class="separator" />

      <ul class="articles">
        <!-- ... qui tutti gli <li> già definiti prima ... -->
      </ul>
    </nav>

    <!-- MAIN CONTENT -->
    <main class="main-content">
      <div class="article-content"></div>
    </main>
  </div>

  <script src="sandbox.js"></script>

</html>

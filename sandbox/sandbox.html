<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <title>GIRSTE'S files</title>

  <!-- Google Fonts -->
  <link
    href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;500&display=swap"
    rel="stylesheet"
  />

  <link rel="stylesheet" href="sandbox.css" />
</head>
<body>
  <div class="container">
    <!-- Sidebar -->
    <nav>
      <h1 class="site-title">
        <a href="https://girste.com">GIRSTE’S files</a>
      </h1>

      <hr class="separator" />

      <p class="header-phrase">
        Qui va una frase semplice che deciderò in seguito
      </p>

      <div class="filters">
        <button class="filter-pill" data-filter="stories">stories</button>
        <button class="filter-pill" data-filter="tools">tools</button>
        <button class="filter-pill" data-filter="blog">blog</button>
      </div>
    </nav>

    <!-- Main content -->
    <main>
      <ul class="articles">
        <li
          class="article"
          data-type="stories"
          data-content="Contenuto dettagliato per Story #1..."
        >
          Example – story #1
        </li>
        <li
          class="article"
          data-type="tools"
          data-content="Descrizione e dettagli per Tool #1..."
        >
          Example – tool #1
        </li>
        <li
          class="article"
          data-type="blog"
          data-content="Testo del blog post #1: Lorem ipsum dolor sit…"
        >
          Example – blog post #1
        </li>
      </ul>

      <div class="article-content">
        <!-- Qui apparirà il contenuto dell’articolo selezionato -->
      </div>
    </main>
  </div>

  <script src="sandbox.js"></script>
</body>
</html>

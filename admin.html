<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>Admin - Nuovo Post</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body { font-family: sans-serif; max-width: 600px; margin: 2rem auto; padding: 1rem; }
    label { display: block; margin-top: 1rem; }
    input, textarea, select, button {
      width: 100%; padding: 0.6rem; font-size: 1rem; margin-top: 0.3rem;
    }
    button { margin-top: 1rem; }
    .drop-zone {
      border: 2px dashed #ccc;
      padding: 1rem;
      text-align: center;
      margin-top: 1rem;
      color: #666;
    }
    .feedback, .img-url { margin-top: 1rem; font-size: 0.9rem; }
    .ok { color: green; }
    .error { color: red; }
    pre { background: #f3f3f3; padding: 0.5rem; overflow-x: auto; }
    .img-url button { margin: 0.2rem 0 1rem 0; }
  </style>
</head>
<body>
  <h1>Nuovo post</h1>

  <label>Titolo</label>
  <input type="text" id="title">

  <label>Snippet</label>
  <input type="text" id="snippet">

  <label>Contenuto (puoi inserire tag &lt;img&gt;)</label>
  <textarea id="content" rows="8"></textarea>

  <label>Tag</label>
  <select id="tag">
    <option value="tools">tools</option>
    <option value="stories">stories</option>
    <option value="blog">blog</option>
  </select>

  <button id="submit">Pubblica</button>
  <div class="feedback" id="feedback"></div>

  <div class="drop-zone" id="drop-zone">📎 Trascina qui una o più immagini da caricare</div>
  <div class="img-url" id="img-url"></div>

  <script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

    const supabaseUrl = 'https://mcvvvhpmpouuupwqlbsn.supabase.co'
    const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1jdnZ2aHBtcG91dXVwd3FsYnNuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDY5ODY5NzEsImV4cCI6MjA2MjU2Mjk3MX0.bEqtAPxy-fB31FrsIh8Mn240udNrKWAsdv4akpjNg8Q'
    const supabase = createClient(supabaseUrl, supabaseKey)

    const title = document.getElementById('title')
    const snippet = document.getElementById('snippet')
    const content = document.getElementById('content')
    const tag = document.getElementById('tag')
    const feedback = document.getElementById('feedback')
    const submitBtn = document.getElementById('submit')
    const dropZone = document.getElementById('drop-zone')
    const imgUrlBox = document.getElementById('img-url')

    // ✅ Pubblica post su schema 'public'
    submitBtn.addEventListener('click', async () => {
      feedback.textContent = ''
      const post = {
        title: title.value,
        snippet: snippet.value,
        content: content.value,
        tag: tag.value,
        image_url: null
      }

      const { error } = await supabase
        .schema('public')
        .from('posts')
        .insert([post])

      if (error) {
        feedback.textContent = '❌ ' + error.message
        feedback.className = 'feedback error'
      } else {
        feedback.textContent = '✅ Post pubblicato!'
        feedback.className = 'feedback ok'
        title.value = snippet.value = content.value = ''
        tag.value = 'tools'
      }
    })

    // ✅ Multi-upload immagini
    dropZone.addEventListener('dragover', (e) => {
      e.preventDefault()
      dropZone.style.borderColor = '#000'
    })

    dropZone.addEventListener('dragleave', () => {
      dropZone.style.borderColor = '#ccc'
    })

    dropZone.addEventListener('drop', async (e) => {
      e.preventDefault()
      dropZone.style.borderColor = '#ccc'

      const files = Array.from(e.dataTransfer.files)
      if (!files.length) return

      imgUrlBox.innerHTML = '⏳ Caricamento immagini...<br>'

      for (const file of files) {
        const filename = `${Date.now()}-${file.name}`
        const { error } = await supabase.storage
          .from('images')
          .upload(filename, file)

        if (error) {
          imgUrlBox.innerHTML += `<span class="error">❌ ${file.name}: ${error.message}</span><br>`
          continue
        }

        const url = `${supabaseUrl}/storage/v1/object/public/images/${filename}`
        imgUrlBox.innerHTML += `
          ✅ ${file.name}<br>
          <pre>&lt;img src="${url}" alt="" /&gt;</pre>
          <button onclick="navigator.clipboard.writeText('<img src=&quot;${url}&quot; alt=&quot;&quot; />')">📋 Copia</button>
          <br><br>
        `
      }
    })
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>Admin - Nuovo Post</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body { font-family: sans-serif; max-width: 600px; margin: 2rem auto; padding: 1rem; }
    label { display: block; margin-top: 1rem; }
    input, textarea, select, button {
      width: 100%; padding: 0.6rem; font-size: 1rem; margin-top: 0.3rem;
    }
    button { margin-top: 1rem; }
    .drop-zone {
      border: 2px dashed #ccc;
      padding: 1rem;
      text-align: center;
      margin-top: 1rem;
      color: #666;
    }
    .feedback, .img-url { margin-top: 1rem; font-size: 0.9rem; }
    .ok { color: green; }
    .error { color: red; }
    pre { background: #f3f3f3; padding: 0.5rem; overflow-x: auto; }
    .img-url button { margin: 0.2rem 0 1rem 0; }
  </style>
</head>
<body>
  <h1>Nuovo post</h1>

  <label for="title">Titolo</label>
  <input type="text" id="title">

  <label for="snippet">Snippet</label>
  <input type="text" id="snippet">

  <label for="content">Contenuto (puoi inserire tag &lt;img&gt;)</label>
  <textarea id="content" rows="8"></textarea>

  <label for="tag">Tag</label>
  <select id="tag">
    <option value="tools">tools</option>
    <option value="stories">stories</option>
    <option value="blog">blog</option>
  </select>

  <button id="submit">Pubblica</button>
  <div class="feedback" id="feedback"></div>

  <div class="drop-zone" id="drop-zone">📎 Trascina qui una o più immagini da caricare</div>
  <div class="img-url" id="img-url"></div>

  <script type="module">
    import { supabase } from './supabase.js'

    // ELEMENTI
    const title     = document.getElementById('title')
    const snippet   = document.getElementById('snippet')
    const content   = document.getElementById('content')
    const tag       = document.getElementById('tag')
    const feedback  = document.getElementById('feedback')
    const submitBtn = document.getElementById('submit')
    const dropZone  = document.getElementById('drop-zone')
    const imgUrlBox = document.getElementById('img-url')

    // 1) PUBBLICA NUOVO POST
    submitBtn.addEventListener('click', async () => {
      feedback.textContent = ''
      const post = {
        title: title.value,
        snippet: snippet.value,
        content: content.value,
        tag: tag.value,
        image_url: null
      }

      const { error } = await supabase
        .from('posts')         // schema public di default
        .insert([post])

      if (error) {
        feedback.textContent = '❌ ' + error.message
        feedback.className = 'feedback error'
      } else {
        feedback.textContent = '✅ Post pubblicato!'
        feedback.className = 'feedback ok'
        title.value = snippet.value = content.value = ''
        tag.value = 'tools'
      }
    })

    // 2) CARICAMENTO IMMAGINI + getPublicUrl()
    dropZone.addEventListener('dragover', e => {
      e.preventDefault()
      dropZone.style.borderColor = '#000'
    })
    dropZone.addEventListener('dragleave', () => {
      dropZone.style.borderColor = '#ccc'
    })

    dropZone.addEventListener('drop', async e => {
      e.preventDefault()
      dropZone.style.borderColor = '#ccc'
      imgUrlBox.innerHTML = '⏳ Caricamento immagini…<br>'

      const files = Array.from(e.dataTransfer.files)
      for (const file of files) {
        const filename = `${Date.now()}-${file.name}`

        // upload
        const { error: uploadError } = await supabase
          .storage
          .from('images')
          .upload(filename, file)

        if (uploadError) {
          imgUrlBox.innerHTML += `<span class="error">❌ ${file.name}: ${uploadError.message}</span><br>`
          continue
        }

        // get public URL
        const { data, error: urlError } = supabase
          .storage
          .from('images')
          .getPublicUrl(filename)

        if (urlError) {
          imgUrlBox.innerHTML += `<span class="error">❌ ${file.name}: ${urlError.message}</span><br>`
          continue
        }

        const publicUrl = data.publicUrl

        // mostra tag <img>
        imgUrlBox.innerHTML += `
          ✅ ${file.name}<br>
          <pre>&lt;img src="${publicUrl}" alt="" /&gt;</pre>
          <button onclick="navigator.clipboard.writeText('<img src=&quot;${publicUrl}&quot; alt=&quot;&quot; />')">
            📋 Copia
          </button>
          <br><br>
        `
      }
    })
  </script>
</body>
</html>

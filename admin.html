<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>Admin Panel</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body { font-family: sans-serif; max-width: 600px; margin: 2rem auto; padding: 1rem; }
    h1, h2 { margin-bottom: 0.5rem; }
    label { display: block; margin-top: 1rem; }
    input, textarea, select, button { 
      width: 100%; padding: 0.6rem; font-size: 1rem; margin-top: 0.3rem; 
    }
    button { cursor: pointer; }
    .section { margin-top: 2rem; }
    .feedback, .img-url { margin-top: 1rem; font-size: 0.9rem; }
    .ok { color: green; }
    .error { color: red; }
    .drop-zone {
      border: 2px dashed #ccc;
      padding: 1rem;
      text-align: center;
      margin-top: 1rem;
      color: #666;
    }
    pre { background: #f3f3f3; padding: 0.5rem; overflow-x: auto; }
    .img-url button { margin: 0.2rem 0 1rem 0; }
  </style>
</head>
<body>
  <h1>Admin Panel</h1>

  <!-- Sezione 1: Nuovo Post -->
  <div class="section">
    <h2>Nuovo Post</h2>
    <label for="title">Titolo</label>
    <input type="text" id="title">
    <label for="snippet">Snippet</label>
    <input type="text" id="snippet">
    <label for="content">Contenuto (puoi inserire tag &lt;img&gt;)</label>
    <textarea id="content" rows="6"></textarea>
    <label for="tag">Tag</label>
    <select id="tag">
      <option value="tools">tools</option>
      <option value="stories">stories</option>
      <option value="blog">blog</option>
    </select>
    <button id="submit-post">Pubblica Post</button>
    <div class="feedback" id="post-feedback"></div>
  </div>

  <!-- Sezione 2: Aggiungi Splash-Text -->
  <div class="section">
    <h2>Nuova Splash-Text</h2>
    <button id="add-splash">Aggiungi Splash-Text</button>
    <div class="feedback" id="splash-feedback"></div>
  </div>

  <!-- Sezione 3: Upload Immagini -->
  <div class="section">
    <h2>Upload Immagini</h2>
    <div class="drop-zone" id="drop-zone">📎 Trascina qui una o più immagini da caricare</div>
    <div class="img-url" id="img-url"></div>
  </div>

  <script type="module">
    import { supabase, addSplashTxt } from './supabase.js'

    // --- POST ---
    const titleInput   = document.getElementById('title')
    const snippetInput = document.getElementById('snippet')
    const contentInput = document.getElementById('content')
    const tagSelect    = document.getElementById('tag')
    const submitPost   = document.getElementById('submit-post')
    const postFb       = document.getElementById('post-feedback')

    submitPost.addEventListener('click', async () => {
      postFb.textContent = ''
      const post = {
        title: titleInput.value,
        snippet: snippetInput.value,
        content: contentInput.value,
        tag: tagSelect.value,
        image_url: null
      }
      const { error } = await supabase.from('posts').insert([post])
      if (error) {
        postFb.textContent = '❌ ' + error.message
        postFb.className = 'feedback error'
      } else {
        postFb.textContent = '✅ Post pubblicato!'
        postFb.className = 'feedback ok'
        titleInput.value = ''
        snippetInput.value = ''
        contentInput.value = ''
        tagSelect.value = 'tools'
      }
    })

    // --- SPLASH-TEXT ---
    const addSplashBtn = document.getElementById('add-splash')
    const splashFb     = document.getElementById('splash-feedback')

    addSplashBtn.addEventListener('click', async () => {
      const phrase = prompt('Inserisci la nuova splash-text:')
      if (!phrase) return
      splashFb.textContent = '⏳ Salvataggio…'
      splashFb.className = 'feedback'
      try {
        await addSplashTxt(phrase)   // usa solo insert({ phrase })
        splashFb.textContent = '✅ Frase aggiunta alla rotazione!'
        splashFb.className = 'feedback ok'
      } catch (err) {
        splashFb.textContent = '❌ ' + err.message
        splashFb.className = 'feedback error'
      }
    })

    // --- UPLOAD IMMAGINI ---
    const dropZone  = document.getElementById('drop-zone')
    const imgUrlBox = document.getElementById('img-url')

    dropZone.addEventListener('dragover', e => {
      e.preventDefault()
      dropZone.style.borderColor = '#000'
    })
    dropZone.addEventListener('dragleave', () => {
      dropZone.style.borderColor = '#ccc'
    })
    dropZone.addEventListener('drop', async e => {
      e.preventDefault()
      dropZone.style.borderColor = '#ccc'
      imgUrlBox.innerHTML = '⏳ Caricamento immagini…<br>'
      const files = Array.from(e.dataTransfer.files)
      for (const file of files) {
        const filename = `${Date.now()}-${file.name}`
        const { error: uploadError } = await supabase
          .storage
          .from('images')
          .upload(filename, file)
        if (uploadError) {
          imgUrlBox.innerHTML += `<span class="error">❌ ${file.name}: ${uploadError.message}</span><br>`
          continue
        }
        const { data, error: urlError } = supabase
          .storage
          .from('images')
          .getPublicUrl(filename)
        if (urlError) {
          imgUrlBox.innerHTML += `<span class="error">❌ ${file.name}: ${urlError.message}</span><br>`
          continue
        }
        const publicUrl = data.publicUrl
        imgUrlBox.innerHTML += `
          ✅ ${file.name}<br>
          <pre>&lt;img src="${publicUrl}" alt="" /&gt;</pre>
          <button onclick="navigator.clipboard.writeText('<img src=&quot;${publicUrl}&quot; alt=&quot;&quot; />')">
            📋 Copia
          </button><br><br>`
      }
    })
  </script>
</body>
</html>

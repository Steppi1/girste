---
title: "GIRSTE’S files"
permalink: /files.html
---

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>{{ page.title }}</title>

  <!-- il tuo font monospace -->
  <link
    href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;700&display=swap"
    rel="stylesheet"
  />
  <!-- CSS principale, non lo tocchiamo -->
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <div class="container">
    <!-- sidebar -->
    <nav class="sidebar">
      <h1 class="site-title">
        <a href="https://girste.com">GIRSTE’S<br>files</a>
      </h1>

      <hr class="separator">

      <p class="header-phrase">
        Qui va una frase semplice che deciderò in seguito
      </p>

      <div class="filters">
        <button class="filter-pill" data-filter="stories">stories</button>
        <button class="filter-pill" data-filter="tools">tools</button>
        <button class="filter-pill" data-filter="blog">blog</button>
        <button class="filter-pill" data-filter="all">all</button>
      </div>

      <hr class="separator">

      <ul class="articles">
        {% assign sorted = site.articles | sort: 'date' | reverse %}
        {% for art in sorted %}
        <li
          class="article"
          data-type="{{ art.type }}"
          data-date="{{ art.date | date: '%Y-%m-%d' }}"
          data-image="{{ art.image }}"
          data-content="{{ art.content | markdownify | strip }}"
        >
          {{ art.title }}
        </li>
        {% endfor %}
      </ul>
    </nav>

    <!-- main content -->
    <main class="main-content">
      <div class="article-content"></div>
    </main>
  </div>

  <!-- JS principale, non lo tocchiamo -->
  <script src="/script.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>girste's files</title>
  <link rel="stylesheet" href="files.css">
</head>
<body>
  <div class="container">
    <nav class="sidebar">
      <div class="title-row stacked-title">
         <a href="/">
          <img src="/assets/arrow.svg" alt="Home" class="home-icon">
        </a>
        <h1 class="site-title">
          <span class="title-text"><strong>GIRSTE’S</strong> files</span>
        </h1>
      </div>
      <hr class="separator">
      <p class="header-phrase"><span class="breathing-text"></span></p>
      <hr class="separator">
      <div class="filters">
        <button class="filter-pill" data-filter="stories">cases</button>
        <button class="filter-pill" data-filter="tools">tools</button>
        <button class="filter-pill" data-filter="blog">notes</button>
        <button class="filter-pill active" data-filter="all">all</button>
      </div>
      <hr class="separator">
      <ul class="articles" id="article-list"></ul>
    </nav>
    <main class="main-content">
      <div class="article-content"></div>
    </main>
  </div>
  <script type="module" src="files.js"></script>
</body>
</html>

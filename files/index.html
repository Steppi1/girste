<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>Admin Panel Protetto</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    * { box-sizing:border-box; margin:0; padding:0 }
    body { font-family:sans-serif; min-height:100vh; }
    button { cursor:pointer; }

    /* Auth panel */
    #auth-panel {
      max-width:400px; margin:3rem auto; padding:1rem;
      border:1px solid #ddd; border-radius:4px;
    }
    #auth-panel label { display:block; margin-top:1rem; }
    #auth-panel input { width:100%; padding:0.6rem; margin-top:0.3rem; }
    .feedback { margin-top:0.5rem; font-size:0.9rem; }
    .feedback.error { color:red }
    .feedback.ok    { color:green }

    /* Admin layout */
    #admin-panel .container { display:flex; min-height:100vh; }
    .sidebar {
      background:#f5f5f5; padding:1rem;
      display:flex; flex-direction:column; width:220px;
    }
    .sidebar button {
      margin-bottom:0.5rem; padding:0.6rem;
      border:none; background:#fff; border-radius:4px;
      text-align:left;
    }
    .sidebar button.active { background:#ddd; }
    .sidebar #btn-logout { margin-top:auto; background:#fee; }

    .content { flex:1; padding:1.5rem; }

    .section { display:none; }
    .section.active { display:block; }

    .field-group { margin-top:1rem; }
    .field-group label { display:block; margin-bottom:0.3rem; }
    .field-group input,
    .field-group textarea,
    .field-group select {
      width:100%; padding:0.6rem;
    }

    .drop-zone {
      border:2px dashed #ccc; padding:1rem; text-align:center;
      color:#666; margin-top:1rem;
    }

    @media (max-width:600px) {
      #admin-panel .container { flex-direction:column; }
      .sidebar {
        flex-direction:row; overflow-x:auto; width:100%;
      }
      .sidebar button { flex:1; margin:0.25rem; font-size:0.9rem; }
    }
  </style>
</head>
<body>

  <!-- LOGIN PANEL -->
  <div id="auth-panel">
    <h2>🔒 Accedi</h2>
    <label for="email">Email</label>
    <input type="email" id="email">
    <label for="password">Password</label>
    <input type="password" id="password">
    <button id="btn-login">Accedi</button>
    <div class="feedback" id="auth-feedback"></div>
  </div>

  <!-- ADMIN PANEL -->
  <div id="admin-panel" style="display:none;">
    <div class="container">

      <nav class="sidebar">
        <button data-section="new-post"    class="nav-btn">📝 Nuovo Post</button>
        <button data-section="edit-post"   class="nav-btn">✏️ Modifica Post</button>
        <button data-section="new-splash"  class="nav-btn">💬 Nuovo Splash</button>
        <button data-section="manage-splash" class="nav-btn">🗑️ Gestione Splash</button>
        <button data-section="manage-photos" class="nav-btn">📷 Gestione Foto</button>
        <button data-section="manage-mosaic" class="nav-btn">🎛️ Gestione Mosaic</button>
        <button id="btn-logout">🚪 Logout</button>
      </nav>

      <main class="content">
        <!-- New Post -->
        <section id="new-post" class="section">
          <h1>Nuovo Post</h1>
          <div class="field-group">
            <label for="np-title">Titolo</label>
            <input type="text" id="np-title">
          </div>
          <div class="field-group">
            <label for="np-snippet">Snippet</label>
            <input type="text" id="np-snippet">
          </div>
          <div class="field-group">
            <label for="np-content">Contenuto</label>
            <textarea id="np-content" rows="5"></textarea>
          </div>
          <div class="field-group">
            <label for="np-tag">Tag</label>
            <select id="np-tag">
              <option value="tools">tools</option>
              <option value="stories">stories</option>
              <option value="blog">blog</option>
            </select>
          </div>
          <button id="submit-new-post">Pubblica Post</button>
          <div class="feedback" id="fb-new-post"></div>
        </section>

        <!-- Edit Post -->
        <section id="edit-post" class="section">
          <h1>Modifica / Cancella Post</h1>
          <div id="list-posts">⏳ Caricamento…</div>
        </section>

        <!-- New Splash -->
        <section id="new-splash" class="section">
          <h1>Nuovo Splash-Text</h1>
          <button id="submit-new-splash">Aggiungi Splash-Text</button>
          <div class="feedback" id="fb-new-splash"></div>
        </section>

        <!-- Manage Splash -->
        <section id="manage-splash" class="section">
          <h1>Modifica / Cancella Splash</h1>
          <div id="list-splash">⏳ Caricamento…</div>
        </section>

        <!-- Manage Photos -->
        <section id="manage-photos" class="section">
          <h1>Gestione Foto</h1>
          <div id="list-photos">⏳ Caricamento…</div>
        </section>

        <!-- Manage Mosaic -->
        <section id="manage-mosaic" class="section">
          <h1>Gestione Mosaic</h1>
          <p>Funzionalità in arrivo…</p>
        </section>
      </main>

    </div>
  </div>

  <script type="module" src="./main.js"></script>
</body>
</html>

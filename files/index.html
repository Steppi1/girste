<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>GIRSTE’S files</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="files.css">
</head>
<body>
  <div class="container">
    <nav class="sidebar">
      <h1 class="site-title" style="display: flex; align-items: center; gap: 0.6rem;">
        <a href="/">
          <img src="/assets/arrow.svg" alt="Home" class="home-icon arrow-icon">
        </a>
        <span><strong>GIRSTE’S</strong> <span class="site-sub">files</span></span>
      </h1>
      <hr class="separator">
      <p class="header-phrase"></p>
      <hr class="separator">
      <div class="filters">
        <button class="filter-pill" data-filter="stories">cases</button>
        <button class="filter-pill" data-filter="tools">lab</button>
        <button class="filter-pill" data-filter="blog">notes</button>
        <button class="filter-pill active" data-filter="all">all</button>
      </div>
      <hr class="separator">
      <ul class="articles" id="article-list"></ul>
    </nav>
    <main class="main-content">
      <div class="article-content"></div>
    </main>
  </div>
  <script type="module" src="files.js"></script>
</body>
</html>

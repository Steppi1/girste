<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>girste's files</title>
  <link rel="icon" href="/assets/girstefav.png">
  <link rel="stylesheet" href="files.css">
</head>
<body>
  <div class="container">
    <nav class="sidebar">
      <div class="title-block">
        <h1 class="site-title">
          <span class="title-text"><strong>GIRSTE’S</strong> files</span>
        </h1>
        <div class="icon-row">
          <a href="/"><img src="/assets/arrow.svg" alt="Home" class="home-icon"></a>
          <img src="/assets/contrast.svg" alt="Toggle contrast" class="contrast-icon" id="contrast-toggle">
        </div>
      </div>
      <hr class="separator">
      <p class="header-phrase"><span class="breathing-text">— splash frase qui —</span></p>
      <hr class="separator">
      <details class="filters-accordion" open>
        <summary class="filters-summary">Filters</summary>
        <div class="filters-list">
          <span class="filter-pill" data-filter="cases">CASES</span>
          <span class="filter-pill" data-filter="tools">TOOLS</span>
          <span class="filter-pill" data-filter="notes">NOTES</span>
          <span class="filter-pill active" data-filter="all">ALL</span>
        </div>
      </details>
      <hr class="separator">
      <ul class="articles" id="article-list"></ul>
    </nav>
    <main class="main-content">
      <div class="article-content"></div>
    </main>
  </div>
  <script type="module" src="../supabase.js"></script>
  <script type="module" src="files.js"></script>
</body>
</html>

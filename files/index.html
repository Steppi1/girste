<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>GIRSTE’S files</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="files.css">
</head>
<body>
  <div class="logo">
    <a href="/">
      <img src="/assets/home-icon.svg" alt="Home" class="logo-icon">
      <span class="logo-main">GIRSTE’S</span>
      <span class="logo-sub">files</span>
    </a>
  </div>
  <div class="container">
    <nav class="sidebar">
      <hr class="separator">

      <p class="header-phrase">Low light. Low budget. Fake ficus.</p>
      <hr class="separator">

      <ul class="filters">
        <li><button class="filter-pill" data-filter="stories">cases</button></li>
        <li><button class="filter-pill" data-filter="tools">lab</button></li>
        <li><button class="filter-pill" data-filter="blog">notes</button></li>
        <li><button class="filter-pill active" data-filter="all">all</button></li>
      </ul>
      <hr class="separator">

      <ul class="articles" id="article-list"></ul>
    </nav>
    <main class="main-content">
      <div class="article-content"></div>
    </main>
  </div>
  <script type="module" src="files.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>girste's files</title>
  <link rel="icon" href="/assets/girstefav.png">
  <link rel="stylesheet" href="files.css">
</head>
<body class="dark">
  <div class="container">
    <nav class="sidebar">
      <!-- Title and splash -->
      <div class="title-block">
        <h1 class="site-title">GIRSTE’S files</h1>
        <p class="header-phrase"><span class="breathing-text"></span></p>
      </div>
      <!-- Icons -->
      <div class="icon-row">
        <a href="/" class="icon-link">
          <img src="/assets/arrow.svg" alt="Home" class="icon arrow-icon">
        </a>
        <img src="/assets/contrast.svg" alt="Toggle contrast" class="icon contrast-icon" id="contrast-toggle">
      </div>
      <!-- Filters static -->
      <div class="filters-static">
        <span class="filter-pill active" data-filter="all">ALL</span>
        <span class="filter-pill" data-filter="cases">CASES</span>
        <span class="filter-pill" data-filter="tools">TOOLS</span>
        <span class="filter-pill" data-filter="notes">NOTES</span>
      </div>
      <!-- Separator -->
      <hr class="separator">
      <!-- Articles list -->
      <ul class="articles" id="article-list"></ul>
    </nav>
    <main class="main-content">
      <div class="article-content"></div>
    </main>
  </div>
  <script type="module" src="../supabase.js"></script>
  <script type="module" src="files.js"></script>
</body>
</html>

<!-- index.html -->
<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Sito Minimal con Side Panel</title>
  <link rel="stylesheet" href="sandbox.css">
</head>
<body>
  <nav>
    <ul>
      <li><a href="#" data-panel="p1">Chi sono</a></li>
      <li><a href="#" data-panel="p2">Progetti</a></li>
      <li><a href="#" data-panel="p3">Contatti</a></li>
    </ul>
  </nav>

  <div class="panels">
    <div id="p1" class="panel">
      <button class="close">×</button>
      <h2>Chi sono</h2>
      <img src="https://via.placeholder.com/300x200" alt="Foto ritratto">
      <p>Testo descrittivo per "Chi sono".</p>
    </div>
    <div id="p2" class="panel">
      <button class="close">×</button>
      <h2>Progetti</h2>
      <img src="https://via.placeholder.com/300x200" alt="Screenshot progetto">
      <p>Descrizione dei progetti.</p>
    </div>
    <div id="p3" class="panel">
      <button class="close">×</button>
      <h2>Contatti</h2>
      <img src="https://via.placeholder.com/300x200" alt="Icona contatti">
      <p>Qui i dettagli per contattarmi.</p>
    </div>
  </div>

  <script src="sandbox.js"></script>
</body>
</html>
